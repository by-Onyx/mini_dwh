name: my-warehouse

services:
  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - data-platform

  postgres-prefect:
    image: postgres:16
    container_name: postgres-prefect
    environment:
      POSTGRES_USER: ${PREFECT_POSTGRES_USER}
      POSTGRES_PASSWORD: ${PREFECT_POSTGRES_PASSWORD}
      POSTGRES_DB: ${PREFECT_POSTGRES_DB}
    volumes:
      - pg-prefect-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PREFECT_POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - data-platform

  prefect-server:
    image: prefecthq/prefect:3-python3.12
    container_name: prefect-server
    depends_on:
      postgres-prefect:
        condition: service_healthy
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://${PREFECT_POSTGRES_USER}:${PREFECT_POSTGRES_PASSWORD}@postgres-prefect:5432/${PREFECT_POSTGRES_DB}
      PREFECT_SERVER_API_DEFAULT_LIMIT: "500"
      PREFECT_UI_API_URL: "http://127.0.0.1:4200/api"
    ports:
      - "4200:4200"
    command: prefect server start --host 0.0.0.0
    volumes:
      - prefect-data:/root/.prefect
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen('http://localhost:4200/api/health', timeout=2)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - data-platform

  prefect-worker:
    build: ./prefect
    container_name: prefect-worker
    env_file:
      - .env
    depends_on:
      prefect-server:
        condition: service_healthy
      minio:
        condition: service_healthy
      postgres-data:
        condition: service_healthy
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
      PREFECT_PROFILES_PATH: /root/.prefect/profiles.toml
    command: prefect worker start --pool default-agent-pool
    volumes:
      - ./prefect:/opt/prefect-code
    working_dir: /opt/prefect-code
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4200/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - data-platform

  postgres-data:
    image: postgres:16
    container_name: postgres-data
    environment:
      POSTGRES_USER: ${DATA_POSTGRES_USER}
      POSTGRES_PASSWORD: ${DATA_POSTGRES_PASSWORD}
      POSTGRES_DB: ${DATA_POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATA_POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - data-platform

  dwh-data-migration:
    image: flyway/flyway:latest
    container_name: dwh-data-migration
    command: -url=jdbc:postgresql://postgres-data:5432/${DATA_POSTGRES_DB} -user=${DATA_POSTGRES_USER} -password=${DATA_POSTGRES_PASSWORD} migrate
    depends_on:
      postgres-data:
        condition: service_healthy   # ждём, пока БД примет соединения
    volumes:
      - ./migrations/dwh/postgresql:/flyway/sql     # монтируем папку с SQL‑миграциями
    networks:
      - data-platform

  api-data:
    image: postgres:16
    container_name: api-data
    environment:
      POSTGRES_USER: ${API_POSTGRES_USER}
      POSTGRES_PASSWORD: ${API_POSTGRES_PASSWORD}
      POSTGRES_DB: ${API_POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - api-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${API_POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - data-platform

  api-data-migration:
    image: flyway/flyway:latest
    container_name: api-data-migration
    command: -url=jdbc:postgresql://api-data:5432/${API_POSTGRES_DB} -user=${API_POSTGRES_USER} -password=${API_POSTGRES_PASSWORD} migrate
    depends_on:
      api-data:
        condition: service_healthy   # ждём, пока БД примет соединения
    volumes:
      - ./migrations/api-data:/flyway/sql     # монтируем папку с SQL‑миграциями
    networks:
      - data-platform

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    ports:
      - "8123:8123"   # HTTP интерфейс (не меняется)
      - "9009:9000"   # Native протокол (хост:9009 -> контейнер:9000)
      - "8082:8123"   # Дополнительный HTTP
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-default}
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    shm_size: 2g
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - data-platform

  clickhouse-migration:
    image: migrate/migrate:v4.17.0
    container_name: clickhouse-migration
    depends_on:
      clickhouse:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./migrations/dwh/clickhouse:/migrations     # монтируем папку с SQL‑миграциями
    command: -path=/migrations -database "clickhouse://clickhouse:8123?username=${CLICKHOUSE_USER}&password=${CLICKHOUSE_PASSWORD}&database=${CLICKHOUSE_DB}" up
    restart: "no"
    networks:
      - data-platform

  pgweb-postgres:
    image: sosedoff/pgweb:latest
    container_name: pgweb-postgres
    ports:
      - "8081:8081"
    environment:
      - PGWEB_DATABASE_URL=postgres://${DATA_POSTGRES_USER}:${DATA_POSTGRES_PASSWORD}@postgres-data:5432/${DATA_POSTGRES_DB}?sslmode=disable
    depends_on:
      postgres-data:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - data-platform

  pgweb-api:
    image: sosedoff/pgweb:latest
    container_name: pgweb-api
    ports:
      - "8084:8081"
    environment:
      - PGWEB_DATABASE_URL=postgres://${API_POSTGRES_USER}:${API_POSTGRES_PASSWORD}@api-data:5432/${API_POSTGRES_DB}?sslmode=disable
    depends_on:
      api-data:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - data-platform

volumes:
  minio-data:
  pg-prefect-data:
  prefect-data:
  pg-data:
  api-data:
  clickhouse-data:

networks:
  data-platform:
    driver: bridge