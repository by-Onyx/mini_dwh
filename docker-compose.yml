version: '3.9'
name: my-warehouse

services:
  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z  
    container_name: minio
    ports:
      - "9000:9000"  
      - "9001:9001"     
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - data-platform

  postgres-prefect: 
    image: postgres:16
    container_name: postgres-prefect
    environment:
      POSTGRES_USER: ${PREFECT_POSTGRES_USER}
      POSTGRES_PASSWORD: ${PREFECT_POSTGRES_PASSWORD}
      POSTGRES_DB: ${PREFECT_POSTGRES_DB}
    volumes:
      - pg-prefect-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PREFECT_POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - data-platform

  prefect-server:
    image: prefecthq/prefect:2-python3.12 
    container_name: prefect-server
    depends_on:
      postgres-prefect:
        condition: service_healthy
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://${PREFECT_POSTGRES_USER}:${PREFECT_POSTGRES_PASSWORD}@postgres-prefect:5432/${PREFECT_POSTGRES_DB}
      PREFECT_SERVER_API_DEFAULT_LIMIT: "500"
      PREFECT_UI_API_URL: "http://127.0.0.1:4200/api" 
    ports:
      - "4200:4200"
    command: prefect server start --host 0.0.0.0
    volumes:
      - prefect-data:/root/.prefect
    restart: unless-stopped
    networks:
      - data-platform

  prefect-worker:
    image: prefecthq/prefect:2-python3.12
    container_name: prefect-worker
    depends_on:
      - prefect-server
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
      PREFECT_PROFILES_PATH: /root/.prefect/profiles.toml
    command: prefect worker start --pool default-agent-pool
    volumes:
      - prefect-data:/root/.prefect
    restart: unless-stopped
    networks:
      - data-platform

  postgres-data:  
    image: postgres:16
    container_name: postgres-data
    environment:
      POSTGRES_USER: ${DATA_POSTGRES_USER}
      POSTGRES_PASSWORD: ${DATA_POSTGRES_PASSWORD}
      POSTGRES_DB: ${DATA_POSTGRES_DB}
    ports:
      - "5433:5432"  
    volumes:
      - pg-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - data-platform

  greenplum: 
    image: woblerr/greenplum:6.27.1 
    container_name: greenplum
    ports:
      - "15432:5432"
      - "10022:22"     
    environment:
      GREENPLUM_USER: ${GREENPLUM_USER}
      GREENPLUM_PASSWORD: ${GREENPLUM_PASSWORD}
      GREENPLUM_DEPLOYMENT: singlenode
    volumes:
      - gp-data:/data/gpdb
      - ./greenplum-init.sh:/docker-entrypoint-initdb.d/init.sh
    shm_size: 2g          
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    restart: unless-stopped
    networks:
      - data-platform

  pgweb-postgres:
    image: sosedoff/pgweb:latest
    container_name: pgweb-postgres
    ports:
      - "8081:8081"
    environment:
      - PGWEB_DATABASE_URL=postgres://${DATA_POSTGRES_USER}:${DATA_POSTGRES_PASSWORD}@postgres-data:5432/${DATA_POSTGRES_DB}?sslmode=disable
    networks:
      - data-platform

  pgweb-greenplum:
    image: sosedoff/pgweb:latest
    container_name: pgweb-greenplum
    ports:
      - "8082:8081"
    environment:
      - PGWEB_DATABASE_URL=postgres://${GREENPLUM_USER}:${GREENPLUM_PASSWORD}@greenplum:5432/${GREENPLUM_DB}?sslmode=disable
    restart: unless-stopped
    networks:
      - data-platform
    depends_on:
      - greenplum

volumes:
  minio-data:
  pg-prefect-data:
  prefect-data:
  pg-data:
  gp-data:
  
networks:
  data-platform:
    driver: bridge