name: simple-dlh-project
prefect-version: 3.1.0

# --- Описание вашего развертывания (деплоймента) ---
deployments:
  - name: mockapi_users_etl_deployment       # Уникальное имя деплоймента
    entrypoint: ./etl/mockapi_users_etl.py:users_etl_flow  # Путь:Имя_вашего_flow
    work_pool:
      name: default-agent-pool           # Имя вашего work pool (см. Шаг 3)

    # 🗓️ --- Настройка расписания (cron) ---
    schedule:
      cron: "0 */1 * * *"   # ЗАМЕНИТЕ на ваше расписание!
      timezone: "Europe/Moscow" # Укажите вашу временную зону

  - name: mockapi_accounts_etl_deployment
    entrypoint: ./etl/mockapi_accounts_etl.py:accounts_etl_flow
    work_pool:
      name: default-agent-pool

    schedule:
      cron: "5 */1 * * *"
      timezone: "Europe/Moscow"

  - name: user_risk_profile_flow_deployment
    entrypoint: ./etl/user_risk_profile_flow.py:user_risk_profile_flow
    work_pool:
      name: default-agent-pool
    schedule:
      cron: "5 */1 * * *"
      timezone: "Europe/Moscow"

  - name: daily_transaction_summary_flow_deployment
    entrypoint: ./etl/daily_transaction_summary_flow.py:daily_transaction_summary_flow
    work_pool:
      name: default-agent-pool
    schedule:
      cron: "10 */1 * * *"
      timezone: "Europe/Moscow"

  - name: account_balance_snapshot_flow_deployment
    entrypoint: ./etl/account_balance_snapshot_flow.py:account_balance_snapshot_flow
    work_pool:
      name: default-agent-pool
    schedule:
      cron: "15 */1 * * *"
      timezone: "Europe/Moscow"